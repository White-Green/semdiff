name: vrt-report
on:
  workflow_run: # zizmor: ignore[dangerous-triggers] VRT report intentionally follows the capture workflow
    workflows: ["vrt-capture"]
    types: [completed]

env:
  VRT_WRANGLER_VERSION: "4.102.0"
  SEMDIFF_VERSION: "v0.4.2"

jobs:
  publish_baseline:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      statuses: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        with:
         script: |
           const { owner, repo } = context.repo;
           const sha = context.payload.workflow_run.head_sha;
           
           await github.rest.repos.createCommitStatus({
             owner, repo, sha,
             state: "pending",
             context: "vrt-report / publish_baseline",
             target_url: process.env.RUN_URL,
           });

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vrt-data
          path: ./actual
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - run: |
          OUT_ROOT="$(pwd)/actual"
          tar -I 'zstd -19' -cf saved.tar.zst -C "${OUT_ROOT}" .

      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.VRT_WRANGLER_VERSION }}
          command: |
            r2 object put ${{ secrets.VRT_CF_R2_BUCKET }}/visual-regression/saved_tar_zst --file ./saved.tar.zst --remote

      - if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;
            
            const jobStatus = process.env.JOB_STATUS; // success|failure|cancelled
            const mapping = {
              success: "success",
              failure: "failure",
              cancelled: "error",
            };
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: mapping[jobStatus],
              context: "vrt-report / publish_baseline",
              target_url: process.env.RUN_URL,
            });

  pr_checks:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      issues: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;
            
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: "pending",
              context: "vrt-report / pr_checks",
              target_url: process.env.RUN_URL,
            });

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vrt-data
          path: ./actual
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - continue-on-error: true
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.VRT_WRANGLER_VERSION }}
          command: |
            r2 object get ${{ secrets.VRT_CF_R2_BUCKET }}/visual-regression/saved_tar_zst --file main-saved.tar.zst --remote

      - run: |
          if [ -f main-saved.tar.zst ]; then
            mkdir -p expected
            tar -xaf main-saved.tar.zst -C expected
          fi
          
          download_url="https://github.com/White-Green/semdiff/releases/download/${SEMDIFF_VERSION}/semdiff-x86_64-unknown-linux-musl.tar.gz"
          mkdir -p .github/tmp
          curl -fsSL "${download_url}" --output .github/tmp/semdiff.tar.gz
          tar -xaf .github/tmp/semdiff.tar.gz -C .github/tmp
          .github/tmp/semdiff/semdiff ./expected ./actual --output-html regression/index.html --output-json ./report.json

      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: ${{ env.VRT_WRANGLER_VERSION }}
          command: |
            pages deploy --project-name ${{ vars.VRT_CF_PAGES_PROJECT_NAME }} --branch pr-${{ github.event.workflow_run.pull_requests[0].number }} ./regression

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VRT_PAGES_PROJECT_NAME: ${{ vars.VRT_CF_PAGES_PROJECT_NAME }}
        with:
          script: |
            const fs = require('fs');
            const path = './report.json';
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const issue_number = context.payload.workflow_run.pull_requests[0].number;
            const pagesProjectName = process.env.VRT_PAGES_PROJECT_NAME;

            const marker = '<!-- visual-regression-diff-marker -->';

            const body = `${marker}
            ## Visual Regression Test Summary

            | Category  | Count               |
            |-----------|---------------------|
            | Unchanged | ${report.unchanged} |
            | Modified  | ${report.modified}  |
            | Added     | ${report.added}     |
            | Deleted   | ${report.deleted}   |

            [Diff Report](https://pr-${issue_number}.${pagesProjectName}.pages.dev/)
            `;

            const { owner, repo } = context.repo;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const oldComments = comments.filter(comment => comment.body.includes(marker));
            for (const { node_id: nodeId } of oldComments) {
              const mutation = `
                mutation($subjectId: ID!) {
                  minimizeComment(input: {
                    subjectId: $subjectId,
                    classifier: OUTDATED
                  }) {
                    minimizedComment {
                      isMinimized
                      minimizedReason
                    }
                  }
                }
              `;

              await github.graphql(mutation, { subjectId: nodeId });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;
            
            const jobStatus = process.env.JOB_STATUS; // success|failure|cancelled
            const mapping = {
              success: "success",
              failure: "failure",
              cancelled: "error",
            };
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: mapping[jobStatus],
              context: "vrt-report / pr_checks",
              target_url: process.env.RUN_URL,
            });
