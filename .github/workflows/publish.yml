name: publish
on:
  workflow_dispatch:

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  build_binary:
    name: Build Binary for ${{ matrix.target }}
    needs: [ ci ]
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            ext: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: windows-2022
            target: aarch64-pc-windows-msvc
            ext: ".exe"
          - os: macOS-14
            target: aarch64-apple-darwin
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses] rust-toolchain channel aliases are intentionally used
        with:
          target: ${{ matrix.target }}

      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt install -y musl-tools

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - id: package
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE_NAME="semdiff-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          mkdir -p .github/archive/semdiff
          mv target/${{ matrix.target }}/release/semdiff${{ matrix.ext }} README.md LICENSE-Apache LICENSE-MIT .github/archive/semdiff
          tar -czf "dist/${ARCHIVE_NAME}" -C .github/archive semdiff
          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "archive_path=dist/${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  publish:
    if: github.actor == 'White-Green'
    needs: build_binary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses] rust-toolchain channel aliases are intentionally used

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - run: cargo fetch --locked

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
          merge-multiple: true

      - run: |
          set -euo pipefail
          
          VERSION=$(cargo metadata --format-version 1 | jq -r '.packages[] | select(.name == "semdiff-cli") | .version')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://api.github.com/repos/White-Green/semdiff/releases/tags/v${VERSION}")
          if [ "${STATUS}" = "404" ]; then
            gh release create "v${VERSION}" --fail-on-no-commits --generate-notes --target "${DEFAULT_BRANCH}" --title "v${VERSION}" release-artifacts/*
          elif [ "${STATUS}" = "200" ]; then
            echo "Release v${VERSION} already exists. Skipping create release."
          else
            echo "Unexpected status code: ${STATUS}" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - run: cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
